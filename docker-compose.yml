services:
  app:
    restart: always
    build: .
    # ports:
    #   - 8093:3000
    #   - 80:3000
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 1024M
      replicas: 4
    volumes:
      - ./data/prod:/app/data
    stop_grace_period: 1s
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/')"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - buzz

  backup:
    restart: always
    build: .
    ports:
      - 8095:3000
      # - 80:3000
    environment:
      - DISCORD_REDIRECT_URI=https://buzzy.sudloh.com/rubgram/callback
      - BASE_URL=https://buzzy.sudloh.com
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 1024M
    volumes:
      - ./data/prod:/app/data
    stop_grace_period: 1s
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/')"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 5s

  nginx:
    restart: always
    image: nginx:stable-alpine
    ports:
      - "8093:80" # Map host primary buzzy port to container port 80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro # Mount Nginx config
    depends_on:
      - app # Ensure backend starts before Nginx
    networks:
      - buzz
    stop_grace_period: 1s

networks:
  buzz:
    driver: bridge
