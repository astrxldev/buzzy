services:
  app:
    restart: always
    build: .
    ports:
      - 8093:3000
      # - 80:3000
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 1024M
    volumes:
      - ./data/prod:/app/data
    stop_grace_period: 1s
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/')"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
