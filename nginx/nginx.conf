events {}

http {
	map $uri $loggable {
	    default 1;
	    ~^/_next 0;

        =/favicon.webp 0;
        =/robots.txt 0;
        
        ~^/api/.*/count$ 0;
	}

	log_format clean ' $request_method $uri $status';
	access_log /var/log/nginx/access.log clean if=$loggable;

    upstream backend {
        # Use the service name defined in docker-compose.yml
        server app:3000;
    }

    server {
        listen 80;

        # Docker's internal DNS resolver
        resolver 127.0.0.11 valid=1s ipv6=off;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support if you want it
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_read_timeout 100s;
        }
    }
}
