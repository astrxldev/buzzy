name: Build and Push Image

on:
  push:
    branches:
      - main
      - dev

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Gitea Registry
        run: |
          echo "${{ secrets.CI_TOKEN }}" | docker login \
            pie.neko-piranha.ts.net:3002 \
            -u ${{ gitea.actor }} \
            --password-stdin

      - name: Restore .env
        run: |
          echo "${{ secrets.ENV_FILE_B64 }}" | base64 -d > .env
          ls -l .env

      - name: Build Image
        run: |
          docker build -t pie.neko-piranha.ts.net:3002/${{ gitea.repository }}:latest .

      - name: Push Image
        run: |
          docker push pie.neko-piranha.ts.net:3002/${{ gitea.repository }}:latest
