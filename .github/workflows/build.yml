name: Build and Push Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          curl -sLO "https://dl.k8s.io/release/v1.35.0/bin/linux/${ARCH}/kubectl"
          chmod +x kubectl
          mv kubectl /usr/local/bin/kubectl

      - name: Configure kubectl
        run: |
          kubectl config set-cluster buzz --server=https://100.75.220.33:6443 --insecure-skip-tls-verify=true
          kubectl config set-credentials ci-deployer --token=${{ secrets.KUBE_TOKEN }}
          kubectl config set-context buzz --cluster=buzz --user=ci-deployer --namespace=buzz
          kubectl config use-context buzz

      - name: Generate .env from K8s secret
        run: |
          kubectl get secret buzz-env -n buzz \
            -o go-template='{{range $k,$v := .data}}{{$k}}={{$v|base64decode}}{{"\n"}}{{end}}' > .env
          ls -l .env

      - run: |
          TAG=${{ gitea.sha }}
          docker build \
            -t mts.dgnr.us:5000/${{ gitea.repository }}:frontend \
            -t mts.dgnr.us:5000/${{ gitea.repository }}:frontend-$TAG \
            .
          docker build --target migration \
            -t mts.dgnr.us:5000/${{ gitea.repository }}:migration \
            -t mts.dgnr.us:5000/${{ gitea.repository }}:migration-$TAG \
            .

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          curl -sLO "https://dl.k8s.io/release/v1.35.0/bin/linux/${ARCH}/kubectl"
          chmod +x kubectl
          mv kubectl /usr/local/bin/kubectl

      - name: Configure kubectl
        run: |
          kubectl config set-cluster buzz --server=https://100.75.220.33:6443 --insecure-skip-tls-verify=true
          kubectl config set-credentials ci-deployer --token=${{ secrets.KUBE_TOKEN }}
          kubectl config set-context buzz --cluster=buzz --user=ci-deployer --namespace=buzz
          kubectl config use-context buzz

      - name: Generate .env from K8s secret
        run: |
          kubectl get secret buzz-env -n buzz \
            -o go-template='{{range $k,$v := .data}}{{$k}}={{$v|base64decode}}{{"\n"}}{{end}}' > .env
          ls -l .env

      - run: |
          TAG=${{ gitea.sha }}
          docker build \
            -f backend.dockerfile \
            -t mts.dgnr.us:5000/${{ gitea.repository }}:backend \
            -t mts.dgnr.us:5000/${{ gitea.repository }}:backend-$TAG \
            .

  push:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    steps:
      - run: |
          TAG=${{ gitea.sha }}
          docker push mts.dgnr.us:5000/${{ gitea.repository }}:backend &
          docker push mts.dgnr.us:5000/${{ gitea.repository }}:backend-$TAG &
          docker push mts.dgnr.us:5000/${{ gitea.repository }}:frontend &
          docker push mts.dgnr.us:5000/${{ gitea.repository }}:frontend-$TAG &
          docker push mts.dgnr.us:5000/${{ gitea.repository }}:migration &
          docker push mts.dgnr.us:5000/${{ gitea.repository }}:migration-$TAG &
          wait

      - name: Install kubectl
        run: |
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          curl -sLO "https://dl.k8s.io/release/v1.35.0/bin/linux/${ARCH}/kubectl"
          chmod +x kubectl
          mv kubectl /usr/local/bin/kubectl

      - name: Configure kubectl
        run: |
          kubectl config set-cluster buzz --server=https://100.75.220.33:6443 --insecure-skip-tls-verify=true
          kubectl config set-credentials ci-deployer --token=${{ secrets.KUBE_TOKEN }}
          kubectl config set-context buzz --cluster=buzz --user=ci-deployer --namespace=buzz
          kubectl config use-context buzz

      - name: Deploy to k3s
        run: |
          TAG=${{ gitea.sha }}

          # DB migration
          kubectl delete job db-migrate -n buzz --ignore-not-found
          cat <<JOBEOF | kubectl apply -f -
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: buzz
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: db-migrate
          image: mts.dgnr.us:5000/${{ gitea.repository }}:migration-$TAG
          command: ["bun", "dr", "push"]
          envFrom:
            - secretRef:
                name: buzz-env
JOBEOF

          # Roll app & backend
          kubectl set image deployment/app app=mts.dgnr.us:5000/${{ gitea.repository }}:frontend-$TAG -n buzz
          kubectl set image deployment/backend backend=mts.dgnr.us:5000/${{ gitea.repository }}:backend-$TAG -n buzz
          kubectl rollout status deployment/app -n buzz --timeout=180s &
          kubectl rollout status deployment/backend -n buzz --timeout=180s &
          kubectl wait --for=condition=complete job/db-migrate -n buzz --timeout=600s &
          wait
